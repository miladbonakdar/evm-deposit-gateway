name: evm-deposit-gateway

x-app: &app
  build:
    context: .
    target: runtime
  image: evm-deposit-gateway:local
  env_file:
    - ${APP_ENV_FILE:-.env}
  environment:
    DATABASE_URL: postgres://postgres:postgres@db:5432/crypto_payment
  volumes:
    - ./config:/app/config:ro
  networks:
    - backend

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crypto_payment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto_payment"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  migrate:
    <<: *app
    command: ["node", "dist/db/migrate.js"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    <<: *app
    command: ["node", "dist/index.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker:
    <<: *app
    command: ["node", "dist/worker.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
